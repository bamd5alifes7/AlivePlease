<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alive Please Tablet Store Asset</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Noto Sans TC", "Microsoft JhengHei UI", "Segoe UI", sans-serif;
      --bg: #061421;
      --bg2: #005c4e;
      --text: #f4fbff;
      --muted: rgba(232, 244, 246, 0.84);
      --accent: #ffb830;
      --green: #00c896;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background:
        radial-gradient(circle at 8% 88%, rgba(0, 200, 150, 0.24), transparent 28%),
        radial-gradient(circle at 84% 10%, rgba(77, 255, 200, 0.18), transparent 30%),
        linear-gradient(120deg, var(--bg), #082135 48%, var(--bg2));
      color: var(--text);
    }

    .stage {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 560px 1fr;
      gap: 42px;
      align-items: center;
      padding: 88px 82px 88px 96px;
    }

    .copy {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .eyebrow {
      width: fit-content;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      padding: 11px 18px 12px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 30px 0 22px;
      max-width: 540px;
      color: var(--text);
      font-size: 72px;
      line-height: 1.16;
      letter-spacing: 0;
      font-weight: 900;
    }

    p {
      margin: 0;
      max-width: 535px;
      color: var(--muted);
      font-size: 34px;
      line-height: 1.52;
      letter-spacing: 0;
      font-weight: 400;
    }

    .screen-wrap {
      justify-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    .screen {
      max-width: 100%;
      max-height: 902px;
      border-radius: 34px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      background: rgba(6, 20, 33, 0.82);
      box-shadow:
        0 34px 90px rgba(0, 0, 0, 0.35),
        0 0 0 10px rgba(255, 255, 255, 0.04);
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="copy">
      <div class="eyebrow">Alive Please</div>
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </section>
    <section class="screen-wrap">
      <img id="screen" class="screen" alt="">
    </section>
  </main>

  <script>
    const slides = {
      "1": {
        image: "tablet_01.png",
        title: "一鍵報平安",
        subtitle: "每天按一下，記錄自己的平安狀態。"
      },
      "2": {
        image: "tablet_02.png",
        title: "太久未打卡時",
        subtitle: "先提醒你，再通知信任的人。"
      },
      "3": {
        image: "tablet_03.png",
        title: "通知節奏自己決定",
        subtitle: "提醒時間、親友 Email、安靜時段都能調整。"
      },
      "4": {
        image: "tablet_04.png",
        title: "第一次使用也清楚",
        subtitle: "跟著導覽完成重要設定。"
      }
    };

    const index = new URLSearchParams(window.location.search).get("i") || "1";
    const slide = slides[index] || slides["1"];
    document.getElementById("title").textContent = slide.title;
    document.getElementById("subtitle").textContent = slide.subtitle;
    document.getElementById("screen").src = slide.image;
  </script>
</body>
</html>
